name: .NET CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    name: Build & Test (.NET 10)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        include-prerelease: true

    - name: Restore dependencies
      run: dotnet restore CriaCerto.slnx

    - name: Build Solution
      run: dotnet build CriaCerto.slnx --no-restore --configuration Release

    - name: Run Tests
      run: dotnet test CriaCerto.slnx --no-build --configuration Release --verbosity normal
