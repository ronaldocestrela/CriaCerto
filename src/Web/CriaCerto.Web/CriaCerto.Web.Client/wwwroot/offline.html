<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CriaCerto Offline</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #f5f7f5;
      color: #1f5638;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    main {
      max-width: 560px;
      text-align: center;
      padding: 2rem;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 1.8rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Offline Mode Active</h1>
    <p>The CriaCerto shell is available offline. Cached pages will continue working until the connection is restored.</p>
  </main>
</body>
</html>
